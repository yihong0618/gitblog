name: Deploy static content to Pages

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled
      - unlabeled
  issue_comment:
    types:
      - created
      - edited
      - deleted
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      id-token: write
      pages: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
      BASE_URL: https://blog.yihong0618.me # change to your own domain
      # Change to below if you are using GitHub Pages
      # BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Checkout isite fork
        uses: actions/checkout@v7
        with:
          repository: yihong0618/isite
          ref: 123a35e42fcd68b3c128c59b9a38b6ba91219533
          path: .isite
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: .isite/go.mod
          cache-dependency-path: .isite/go.sum
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Build isite
        working-directory: .isite
        run: |
          go build -trimpath -o "$RUNNER_TEMP/isite" ./cmd/isite
      - name: Generate Astro site
        run: |
          "$RUNNER_TEMP/isite" generate \
            --engine astro \
            --user "$REPO_OWNER" \
            --repo "$REPOSITORY_NAME" \
            --output output \
            --config config.toml \
            --base-url "$BASE_URL"
          npm install --prefix output --no-audit --no-fund
          npm run build --prefix output
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: pages-artifact
          path: output/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: pages-artifact
